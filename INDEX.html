<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="fullpage.css" />
    <script type="text/javascript" src="fullpage.js"></script>
    <style>
       #fullpage .section:nth-child(1){
            background: url(./1.jpg) center/cover;
        }
        #fullpage .section:nth-child(2){
            background: url(./2.jpg) center/cover;
        }
        #fullpage .section:nth-child(4){
            background: url(./4.jpg) center/cover;
        }
        .section:nth-child(3){
            position: relative;
        }
        .section:nth-child(3) iframe{
            position: absolute;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="fullpage">
        <div class="section"></div>
        <div class="section"></div>
        <div class="section">
            <iframe width="1280" height="720" src="https://www.youtube.com/embed/Q3K0TOvTOno" title="NewJeans (뉴진스) &#39;How Sweet&#39; Official MV" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
        <div class="section"></div>
    </div>
    <script>
        new fullpage('#fullpage', {
        navigation: true,
	    autoScrolling:true,
	    scrollHorizontally: true
});
    </script>
</body>
</html>
